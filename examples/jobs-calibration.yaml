version: 1
logs_dir: ./runs
lease_timeout: 10
backend: green

defaults:
  cwd: .
  device: 0
  work_queue_connections: 4
  env:
    PYTHONUNBUFFERED: "1"

calibration:
  enabled: true
  duration: 3
  rounds: 2
  tolerance: 0.01
  damping: 0.7
  warmup: 0.5
  minimum_samples: 3
  sample_window: 10

jobs:
  - name: calibration-small
    script: throughput_worker.py
    args: ["--size", "2048", "--seconds", "5"]
    sm_share: 50
    target_share: 30
    memory_share: 0.30

  - name: calibration-large
    script: throughput_worker.py
    args: ["--size", "2048", "--seconds", "5"]
    sm_share: 50
    target_share: 70
    memory_share: 0.65
